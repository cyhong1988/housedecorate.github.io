<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>裝潢預算管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #d4af37;
            --text-main: #333;
            --text-sub: #7f8c8d;
            --danger: #e74c3c;
            --success: #27ae60;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 800px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-weight: 300; letter-spacing: 2px; color: var(--primary-color); margin-bottom: 5px; font-size: 1.4rem; }

        /* 總表儀表板 */
        .summary-dashboard {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            border-radius: var(--border-radius);
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }
        .summary-item .label { font-size: 0.7rem; opacity: 0.8; margin-bottom: 3px; }
        .summary-item .amount { font-size: 1.1rem; font-weight: 600; color: var(--accent-color); }
        .budget-input {
            background: rgba(255,255,255,0.1); color: var(--accent-color); font-size: 1.1rem;
            font-weight: 600; width: 100%; padding: 2px 0; border: none; border-bottom: 1px solid var(--accent-color); outline: none;
        }

        /* 分類卡片 */
        .category-card { background: var(--card-bg); border-radius: var(--border-radius); padding: 12px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .category-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; margin-bottom: 15px; }
        .category-title-group { display: flex; align-items: center; gap: 8px; }
        .category-title { font-size: 1rem; font-weight: 600; color: var(--primary-color); }
        .subtotal { font-size: 0.8rem; color: var(--text-sub); }
        
        /* 新增按鈕樣式 */
        .btn-open-add { background: var(--accent-color); color: white; border: none; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; transition: 0.2s; }
        .btn-open-add:hover { opacity: 0.8; }

        /* 表格樣式 */
        .table-wrapper { width: 100%; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; } 
        th, td { padding: 8px 2px; border-bottom: 1px solid #eee; font-size: 0.75rem; vertical-align: middle; word-wrap: break-word; }
        
        .col-check { width: 30px; text-align: center; }
        .col-drag  { width: 25px; text-align: center; }
        .col-name  { width: auto; white-space: normal; line-height: 1.3; padding-right: 5px; }
        .col-url   { width: 30px; text-align: center; }
        .col-inst  { width: 75px; text-align: center; line-height: 1.1; }
        .col-price { width: 70px; text-align: right; font-weight: 500; }
        .col-action { width: 55px; text-align: right; }
        
        .is-purchased { background-color: #fcfcfc; opacity: 0.6; }
        .is-purchased .col-name, .is-purchased .col-price, .is-purchased .col-inst { text-decoration: line-through; }

        .drag-handle { cursor: grab; color: #ccc; font-size: 0.9rem; }
        .btn-edit { color: var(--text-sub); margin-right: 2px; font-size: 1rem; background: none; border:none; cursor: pointer; }
        .btn-delete { color: #ddd; font-size: 1rem; background: none; border:none; cursor: pointer; }
        .link-icon { text-decoration: none; color: var(--accent-color); font-size: 1rem; }
        
        .inst-badge { font-size: 0.65rem; color: #999; display: block; margin-top: 1px; }

        /* 彈跳視窗共用樣式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .modal-content {
            background: white; padding: 20px; border-radius: var(--border-radius);
            width: 85%; max-width: 350px; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .modal-field { display: flex; flex-direction: column; gap: 4px; }
        .modal-field label { font-size: 0.75rem; color: var(--text-sub); }
        .modal-field input, .modal-field select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; font-size: 14px; }
        .btn-modal-save { background: var(--primary-color); color: white; border: none; padding: 10px; font-weight: 600; border-radius: 6px; cursor: pointer; }
        .btn-modal-cancel { background: #eee; color: #666; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }

        .sync-status { font-size: 0.7rem; text-align: center; margin-bottom: 10px; color: var(--text-sub); }

        @media (max-width: 500px) {
            th, td { font-size: 0.7rem; }
            .col-inst { width: 65px; }
            .col-price { width: 65px; }
        }
    </style>
</head>
<body>

<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <div style="font-weight:600; border-bottom:1px solid #eee; padding-bottom:8px;">✎ 編輯項目</div>
        <input type="hidden" id="edit-id">
        <input type="hidden" id="edit-category">
        <div class="modal-field"><label>名稱</label><input type="text" id="modal-name"></div>
        <div class="modal-field"><label>網址</label><input type="text" id="modal-url"></div>
        <div class="modal-field"><label>金額</label><input type="number" id="modal-price"></div>
        <div class="modal-field">
            <label>分期</label>
            <select id="modal-inst">
                <option value="1">單次付清</option>
                <option value="3">3 期</option>
                <option value="6">6 期</option>
                <option value="12">12 期</option>
                <option value="24">24 期</option>
                <option value="30">30 期</option>
            </select>
        </div>
        <div style="display:flex; gap:8px; margin-top:10px;">
            <button class="btn-modal-cancel" style="flex:1;" onclick="closeModal('editModal')">取消</button>
            <button class="btn-modal-save" style="flex:2;" onclick="saveEdit()">儲存修改</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal-content">
        <div style="font-weight:600; border-bottom:1px solid #eee; padding-bottom:8px;">➕ 新增項目</div>
        <input type="hidden" id="add-category">
        <div class="modal-field"><label>名稱</label><input type="text" id="new-name" placeholder="例如：沙發"></div>
        <div class="modal-field"><label>網址</label><input type="text" id="new-url" placeholder="https://..."></div>
        <div class="modal-field"><label>金額</label><input type="number" id="new-price" placeholder="0"></div>
        <div class="modal-field">
            <label>分期</label>
            <select id="new-inst">
                <option value="1">單次付清</option>
                <option value="3">3 期</option>
                <option value="6">6 期</option>
                <option value="12">12 期</option>
                <option value="24">24 期</option>
                <option value="30">30 期</option>
            </select>
        </div>
        <div style="display:flex; gap:8px; margin-top:10px;">
            <button class="btn-modal-cancel" style="flex:1;" onclick="closeModal('addModal')">取消</button>
            <button class="btn-modal-save" style="flex:2;" onclick="confirmAdd()">確認新增</button>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <h1>庭林群青 預算書</h1>
    </header>

    <div class="sync-status" id="sync-status">正在載入數據...</div>

    <div class="summary-dashboard">
        <div class="summary-item">
            <div class="label">🎯 預算目標</div>
            <input type="number" id="budget-goal" class="budget-input" oninput="updateTotalsOnly()">
        </div>
        <div class="summary-item">
            <div class="label">💰 累計支出</div>
            <div class="amount" id="grand-total">$ 0</div>
        </div>
        <div class="summary-item">
            <div class="label">⚖️ 剩餘預算</div>
            <div class="amount" id="remaining-budget">$ 0</div>
        </div>
        <div class="summary-item">
            <div class="label">📊 工程佔比</div>
            <div class="amount" id="percent-eng">0%</div>
        </div>
    </div>

    <script>
        const sections = [
            { id: 'engineering', title: '🏗️ 裝修工程' },
            { id: 'appliances', title: '📺 家電設備' },
            { id: 'furniture', title: '🛋️ 傢俱軟裝' }
        ];

        sections.forEach(sec => {
            document.write(`
                <section class="category-card" data-category="${sec.id}">
                    <div class="category-header">
                        <div class="category-title-group">
                            <div class="category-title">${sec.title}</div>
                            <button class="btn-open-add" onclick="openAddModal('${sec.id}')">➕ 新增</button>
                        </div>
                        <div class="subtotal">小計: <span id="subtotal-${sec.id}">$ 0</span></div>
                    </div>
                    <div class="table-wrapper">
                        <table id="table-${sec.id}">
                            <thead>
                                <tr>
                                    <th class="col-check">✔</th>
                                    <th class="col-drag"></th>
                                    <th class="col-name">名稱</th>
                                    <th class="col-url">🔗</th>
                                    <th class="col-inst">分期</th>
                                    <th class="col-price">金額</th>
                                    <th class="col-action"></th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </section>
            `);
        });
    </script>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx0MvelMerRnzM8v7yN7RA-OcA4e0pSl9MO20FOSDJIbGml2yCiAz1qxSpvnVfDucbb/exec';
    let data = { engineering: [], appliances: [], furniture: [] };

    async function initData() {
        const savedBudget = localStorage.getItem('decoration_budget_goal');
        if (savedBudget) document.getElementById('budget-goal').value = savedBudget;
        try {
            const response = await fetch(GOOGLE_SCRIPT_URL);
            const cloudData = await response.json();
            data = { engineering: [], appliances: [], furniture: [] };
            cloudData.forEach(item => {
                if (data[item.category]) {
                    data[item.category].push({ 
                        id: item.id, name: item.name, url: item.url || '', 
                        price: parseFloat(item.price), purchased: !!item.purchased,
                        installments: parseInt(item.installments) || 1
                    });
                }
            });
            document.getElementById('sync-status').innerText = '同步完成：' + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('sync-status').innerText = '載入失敗';
        }
        render();
        initSortable();
    }

    function initSortable() {
        ['engineering', 'appliances', 'furniture'].forEach(category => {
            const el = document.querySelector(`#table-${category} tbody`);
            Sortable.create(el, {
                animation: 150, handle: '.drag-handle',
                onEnd: function () {
                    const rows = Array.from(el.querySelectorAll('tr[data-id]'));
                    const idOrder = rows.map(r => parseInt(r.dataset.id));
                    data[category] = idOrder.map(id => data[category].find(i => i.id === id));
                    syncToCloud('REORDER', category, { idOrder: idOrder });
                }
            });
        });
    }

    async function syncToCloud(action, category, item) {
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ action, category, ...item })
            });
        } catch (e) {}
    }

    // 新增彈窗邏輯
    function openAddModal(category) {
        document.getElementById('add-category').value = category;
        document.getElementById('new-name').value = '';
        document.getElementById('new-url').value = '';
        document.getElementById('new-price').value = '';
        document.getElementById('new-inst').value = '1';
        document.getElementById('addModal').style.display = 'flex';
    }

    function confirmAdd() {
        const category = document.getElementById('add-category').value;
        const name = document.getElementById('new-name').value;
        const url = document.getElementById('new-url').value;
        const price = parseFloat(document.getElementById('new-price').value);
        const inst = parseInt(document.getElementById('new-inst').value);

        if (!name || isNaN(price)) {
            alert('請輸入完整名稱與金額');
            return;
        }

        const newItem = { id: Date.now(), name, url, price, purchased: false, installments: inst };
        data[category].push(newItem);
        syncToCloud('ADD', category, newItem);
        closeModal('addModal');
        render();
    }

    // 編輯彈窗邏輯
    function openModal(category, id) {
        const item = data[category].find(i => i.id === id);
        if (!item) return;
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-category').value = category;
        document.getElementById('modal-name').value = item.name;
        document.getElementById('modal-url').value = item.url;
        document.getElementById('modal-price').value = item.price;
        document.getElementById('modal-inst').value = item.installments;
        document.getElementById('editModal').style.display = 'flex';
    }

    function closeModal(modalId) { 
        document.getElementById(modalId).style.display = 'none'; 
    }

    function saveEdit() {
        const id = parseInt(document.getElementById('edit-id').value);
        const category = document.getElementById('edit-category').value;
        const item = data[category].find(i => i.id === id);
        if (item) {
            item.name = document.getElementById('modal-name').value;
            item.url = document.getElementById('modal-url').value;
            item.price = parseFloat(document.getElementById('modal-price').value);
            item.installments = parseInt(document.getElementById('modal-inst').value);
            syncToCloud('UPDATE', category, item);
        }
        closeModal('editModal');
        render();
    }

    function togglePurchased(category, id) {
        const item = data[category].find(i => i.id === id);
        if (item) {
            item.purchased = !item.purchased;
            syncToCloud('UPDATE', category, item); 
            render();
        }
    }

    function deleteItem(category, id) {
        if(!confirm('確定要刪除此項目嗎？')) return;
        data[category] = data[category].filter(i => i.id !== id);
        syncToCloud('DELETE', category, { id });
        render();
    }

    function formatCurrency(num) { return '$' + Math.round(num).toLocaleString(); }

    function updateTotalsOnly() {
        let grandTotal = 0, subMap = { engineering: 0, appliances: 0, furniture: 0 };
        for (let cat in data) {
            data[cat].forEach(i => subMap[cat] += i.price);
            document.getElementById(`subtotal-${cat}`).innerText = formatCurrency(subMap[cat]);
            grandTotal += subMap[cat];
        }
        document.getElementById('grand-total').innerText = formatCurrency(grandTotal);
        const goal = parseFloat(document.getElementById('budget-goal').value) || 0;
        localStorage.setItem('decoration_budget_goal', goal);
        const remain = goal - grandTotal;
        const remEl = document.getElementById('remaining-budget');
        remEl.innerText = formatCurrency(remain);
        remEl.style.color = remain < 0 ? 'var(--danger)' : 'var(--accent-color)';
        const engPercent = grandTotal > 0 ? Math.round((subMap.engineering / grandTotal) * 100) : 0;
        document.getElementById('percent-eng').innerText = engPercent + '%';
    }

    function render() {
        for (let category in data) {
            const tbody = document.querySelector(`#table-${category} tbody`);
            tbody.innerHTML = '';
            // 已購買項目排序至底部
            data[category].sort((a, b) => (b.purchased === a.purchased) ? 0 : b.purchased ? -1 : 1);
            data[category].forEach(item => {
                const tr = document.createElement('tr');
                tr.dataset.id = item.id;
                if (item.purchased) tr.classList.add('is-purchased');
                const urlLink = item.url ? `<a href="${item.url.startsWith('http') ? item.url : 'https://' + item.url}" target="_blank" class="link-icon">🔗</a>` : '';
                const instText = item.installments > 1 
                    ? `${item.installments}期<span class="inst-badge">${formatCurrency(item.price / item.installments)}</span>` : '單次';

                tr.innerHTML = `
                    <td class="col-check"><input type="checkbox" ${item.purchased ? 'checked' : ''} onchange="togglePurchased('${category}', ${item.id})"></td>
                    <td class="col-drag drag-handle">☰</td>
                    <td class="col-name">${item.name}</td>
                    <td class="col-url">${urlLink}</td>
                    <td class="col-inst">${instText}</td>
                    <td class="col-price">${formatCurrency(item.price)}</td>
                    <td class="col-action">
                        <button class="btn-edit" onclick="openModal('${category}', ${item.id})">✎</button>
                        <button class="btn-delete" onclick="deleteItem('${category}', ${item.id})">×</button>
                    </td>`;
                tbody.appendChild(tr);
            });
        }
        updateTotalsOnly();
    }
    initData();
</script>
</body>
</html>
